<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>वार्षिक परीक्षा उपस्थिति विवरण</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --blue:#1a56db; --dark:#1e293b; --ink:#1e3a8a; --border:#cbd5e1; }
body { font-family:'Noto Sans Devanagari',sans-serif; background:#e2e8f0; color:var(--dark); }

@media screen {
  .screen-ui { display:block; }
  .print-page { display:none; }
}

.wrap { max-width:1200px; margin:0 auto; padding:1.5rem; }
.app-header { text-align:center; margin-bottom:1.5rem; }
.app-header h1 { font-size:1.5rem; font-weight:700; }
.app-header p { color:#64748b; font-size:0.85rem; margin-top:0.3rem; }
.layout { display:grid; grid-template-columns:370px 1fr; gap:1.5rem; align-items:start; }

.input-panel {
  background:#fff; border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  padding:1.4rem; position:sticky; top:1rem;
}
.sec-title {
  font-size:.95rem; font-weight:700;
  border-left:3px solid var(--blue); padding-left:.6rem; margin-bottom:.9rem;
}
.form-group { margin-bottom:.75rem; }
.form-group label { display:block; font-size:.78rem; font-weight:600; color:#475569; margin-bottom:.3rem; }
.form-group input {
  width:100%; border:1.5px solid var(--border); border-radius:7px;
  padding:.42rem .7rem; font-family:'Noto Sans Devanagari',sans-serif;
  font-size:.88rem; outline:none; transition:border-color .18s;
}
.form-group input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,86,219,.1); }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }

.col-hd { display:grid; grid-template-columns:78px 1fr 1fr; gap:.4rem; padding:0 .5rem; margin-bottom:.25rem; }
.col-hd span { font-size:.7rem; font-weight:600; color:#94a3b8; text-align:center; }
.col-hd span:first-child { text-align:left; }

.class-row {
  display:grid; grid-template-columns:78px 1fr 1fr; gap:.4rem;
  align-items:center; background:#f8fafc; border:1px solid #e2e8f0;
  border-radius:6px; padding:.38rem .5rem; margin-bottom:.35rem;
}
.class-label { font-weight:600; font-size:.82rem; }
.class-row input {
  border:1.5px solid var(--border); border-radius:5px;
  padding:.3rem .4rem; font-size:.85rem; text-align:center;
  font-family:'Noto Sans Devanagari',sans-serif; outline:none; width:100%;
}
.class-row input:focus { border-color:var(--blue); }
.note { font-size:.7rem; color:#ef4444; margin-bottom:.7rem; }

.btn {
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  width:100%; background:var(--blue); color:#fff; border:none;
  border-radius:8px; padding:.75rem; font-size:.95rem; font-weight:700;
  font-family:'Noto Sans Devanagari',sans-serif; cursor:pointer;
  margin-top:1.1rem; transition:background .18s;
}
.btn:hover { background:#1e40af; }

.preview-label {
  font-size:.82rem; color:#64748b;
  display:flex; justify-content:space-between; margin-bottom:.5rem;
}
.preview-scroll { overflow-x:auto; background:#94a3b8; padding:1rem; border-radius:8px; }

/* ===== A4 DOCUMENT ===== */
.a4 {
  width:210mm; background:#fff; padding:12mm 16mm;
  margin:0 auto; font-family:'Noto Sans Devanagari',sans-serif; color:#000;
}
.doc-title-box {
  border:2px solid #000; border-radius:3px;
  text-align:center; padding:.4rem 1rem; margin-bottom:.9rem;
}
.doc-title-box h2 { font-size:1.1rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
.doc-title-box .sess { font-size:.85rem; margin-top:.15rem; }

.info-row { display:flex; align-items:flex-end; margin-bottom:.45rem; }
.info-row .lbl { font-weight:700; font-size:.85rem; white-space:nowrap; margin-right:.5rem; }
.info-row .val {
  flex:1; border-bottom:1px dashed #888; min-height:1.3rem;
  padding-bottom:.08rem; font-family:'Kalam',cursive; font-size:.95rem; color:var(--ink);
}
.info-two { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:.45rem; }

.doc-table { width:100%; border-collapse:collapse; margin:.7rem 0; font-size:.85rem; }
.doc-table th {
  background:#1e293b; color:#fff; padding:.4rem .3rem;
  text-align:center; font-weight:600; border:1px solid #1e293b;
}
.doc-table td { border:1px solid #475569; padding:.35rem .3rem; text-align:center; }
.doc-table tbody tr:nth-child(even) td { background:#f8fafc; }
.doc-table .td-name { text-align:left; padding-left:.6rem; font-weight:600; }
.doc-table .ink { font-family:'Kalam',cursive; color:var(--ink); font-size:.92rem; }
.doc-table tfoot td { background:#1e293b; color:#fff; font-weight:700; border-color:#1e293b; }
.doc-table tfoot .ink { color:#bfdbfe; }

.summary-box { border:1.5px solid #334155; border-radius:4px; padding:.5rem .9rem; margin-top:.4rem; }
.summary-box .s-title { font-weight:700; font-size:.85rem; border-bottom:1px solid #cbd5e1; padding-bottom:.25rem; margin-bottom:.4rem; }
.sum-row { display:flex; justify-content:space-around; flex-wrap:wrap; gap:.4rem; }
.sum-item { display:flex; align-items:center; gap:.25rem; font-size:.8rem; }
.sum-item .sl { font-weight:600; }
.sum-item .sv { font-family:'Kalam',cursive; font-size:1rem; color:var(--ink); font-weight:700; min-width:2rem; }

.sig-wrap { display:flex; justify-content:flex-end; margin-top:2rem; }
.sig-box { text-align:center; min-width:180px; }
.sig-name { font-family:'Kalam',cursive; font-size:1rem; color:var(--ink); min-height:2rem; margin-bottom:.35rem; }
.sig-line { border-top:1.5px solid #000; padding-top:.25rem; font-size:.78rem; font-weight:700; }

/* ===== PRINT ===== */
@media print {
  .screen-ui { display:none !important; }
  .print-page { display:block !important; }
  @page { size:A4 portrait; margin:0; }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  .a4 {
    width:210mm; height:297mm; padding:10mm 14mm; margin:0;
    display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
  }
  .doc-table { font-size:.78rem; }
  .doc-table th, .doc-table td { padding:.28rem .25rem; }
  .sum-item { font-size:.75rem; }
  .sig-wrap { margin-top:auto; padding-top:.5rem; }
}
</style>
</head>
<body>

<!-- SCREEN UI -->
<div class="screen-ui">
<div class="wrap">
  <div class="app-header">
    <h1>📋 वार्षिक परीक्षा उपस्थिति विवरण</h1>
    <p>विवरण भरें → प्रीव्यू देखें → PDF डाउनलोड करें</p>
  </div>

  <div class="layout">

    <!-- LEFT: Input -->
    <div class="input-panel">
      <div class="sec-title">🏫 विद्यालय का विवरण</div>
      <div class="form-group">
        <label>विद्यालय का नाम</label>
        <input type="text" id="schoolName" oninput="sync()">
      </div>
      <div class="row2">
        <div class="form-group">
          <label>UDISE कोड</label>
          <input type="text" id="udiseCode" oninput="sync()">
        </div>
        <div class="form-group">
          <label>दिनांक</label>
          <input type="date" id="examDate" oninput="sync()">
        </div>
      </div>
      <div class="form-group">
        <label>प्रधानाध्यापक का नाम</label>
        <input type="text" id="principalName" oninput="sync()">
      </div>

      <div class="sec-title" style="margin-top:1.1rem">📊 कक्षावार उपस्थिति</div>
      <p class="note">★ केवल नामांकन और उपस्थित भरें — बाकी स्वतः कैलकुलेट होगा</p>
      <div class="col-hd">
        <span>कक्षा</span><span>नामांकन</span><span>उपस्थित</span>
      </div>
      <div id="classInputs"></div>

      <button class="btn" onclick="downloadPDF()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
        </svg>
        PDF डाउनलोड करें
      </button>
    </div>

    <!-- RIGHT: Preview -->
    <div>
      <div class="preview-label">
        <span>📄 लाइव प्रीव्यू (A4)</span>
        <span style="color:#22c55e;font-weight:600">● हर अक्षर पर live update</span>
      </div>
      <div class="preview-scroll">
        <div class="a4" id="previewDoc"></div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- PRINT PAGE -->
<div class="print-page">
  <div class="a4" id="printDoc"></div>
</div>

<script>
const NAMES = ["वर्ग I","वर्ग II","वर्ग III","वर्ग IV","वर्ग V","वर्ग VI","वर्ग VII","वर्ग VIII"];

// Build class input rows
const ci = document.getElementById('classInputs');
NAMES.forEach((_,i) => {
  ci.innerHTML += `<div class="class-row">
    <span class="class-label">${NAMES[i]}</span>
    <input type="number" min="0" id="adm_${i}" oninput="recalc(${i})">
    <input type="number" min="0" id="pres_${i}" oninput="recalc(${i})">
  </div>`;
});

// Set today's date
document.getElementById('examDate').value = new Date().toISOString().split('T')[0];

function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function getData() {
  const rows = NAMES.map((_,i) => {
    const aEl  = document.getElementById(`adm_${i}`);
    const pEl  = document.getElementById(`pres_${i}`);
    const adm  = parseInt(aEl.value)  || 0;
    const pres = parseInt(pEl.value) || 0;
    const filled = aEl.value.trim() !== '';
    return {
      name: NAMES[i], adm, pres,
      abs: Math.max(0, adm - pres),
      pct: adm > 0 ? (pres/adm*100).toFixed(1)+'%' : '',
      filled
    };
  });
  const tA = rows.reduce((s,r) => s+r.adm,  0);
  const tP = rows.reduce((s,r) => s+r.pres, 0);
  return {
    school:    document.getElementById('schoolName').value,
    udise:     document.getElementById('udiseCode').value,
    date:      fmtDate(document.getElementById('examDate').value),
    principal: document.getElementById('principalName').value,
    rows, tA, tP,
    tAbs: tA - tP,
    tPct: tA > 0 ? (tP/tA*100).toFixed(1)+'%' : '',
    any:  tA > 0
  };
}

function buildHTML(d) {
  return `
  <div class="doc-title-box">
    <h2>वार्षिक परीक्षा उपस्थिति विवरण</h2>
    <div class="sess">शैक्षणिक वर्ष : <strong>2025 – 2026</strong></div>
  </div>

  <div class="info-row">
    <span class="lbl">विद्यालय का नाम :</span>
    <span class="val">${d.school}</span>
  </div>
  <div class="info-two">
    <div class="info-row">
      <span class="lbl">दिनांक :</span>
      <span class="val">${d.date}</span>
    </div>
    <div class="info-row">
      <span class="lbl">UDISE कोड :</span>
      <span class="val">${d.udise}</span>
    </div>
  </div>

  <table class="doc-table">
    <thead>
      <tr>
        <th>वर्ग (Class)</th>
        <th>नामांकन</th>
        <th>उपस्थित</th>
        <th>अनुपस्थित</th>
        <th>उपस्थिति %</th>
      </tr>
    </thead>
    <tbody>
      ${d.rows.map(r => `<tr>
        <td class="td-name">${r.name}</td>
        <td class="ink">${r.filled ? r.adm  : ''}</td>
        <td class="ink">${r.filled ? r.pres : ''}</td>
        <td class="ink">${r.filled ? r.abs  : ''}</td>
        <td class="ink">${r.filled ? r.pct  : ''}</td>
      </tr>`).join('')}
    </tbody>
    <tfoot>
      <tr>
        <td class="td-name">कुल (Total)</td>
        <td class="ink">${d.any ? d.tA   : ''}</td>
        <td class="ink">${d.any ? d.tP   : ''}</td>
        <td class="ink">${d.any ? d.tAbs : ''}</td>
        <td class="ink">${d.any ? d.tPct : ''}</td>
      </tr>
    </tfoot>
  </table>

  <div class="summary-box">
    <div class="s-title">संक्षिप्त विवरण (Summary) :</div>
    <div class="sum-row">
      <div class="sum-item"><span class="sl">कुल नामांकन :</span><span class="sv">${d.any ? d.tA   : ''}</span></div>
      <div class="sum-item"><span class="sl">उपस्थित :</span><span class="sv">${d.any ? d.tP   : ''}</span></div>
      <div class="sum-item"><span class="sl">अनुपस्थित :</span><span class="sv">${d.any ? d.tAbs : ''}</span></div>
      <div class="sum-item"><span class="sl">औसत उपस्थिति :</span><span class="sv">${d.any ? d.tPct : ''}</span></div>
    </div>
  </div>

  <div class="sig-wrap">
    <div class="sig-box">
      <div class="sig-name">${d.principal}</div>
      <div class="sig-line">प्रधानाध्यापक का हस्ताक्षर व मुहर</div>
    </div>
  </div>`;
}

function recalc(i) {
  const a  = parseInt(document.getElementById(`adm_${i}`).value) || 0;
  const pe = document.getElementById(`pres_${i}`);
  if (a > 0 && (parseInt(pe.value)||0) > a) pe.value = a;
  sync();
}

function sync() {
  const html = buildHTML(getData());
  document.getElementById('previewDoc').innerHTML = html;
  document.getElementById('printDoc').innerHTML   = html;
}

function downloadPDF() {
  sync();
  window.print();
}

sync();
</script>
</body>
</html>
